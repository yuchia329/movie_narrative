<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Yapper">
  <!-- Neo / terminal dark-mode tile: a neon play glyph (video) over a terminal cursor
       underscore, inside a glowing accent border. Palette matches the app (config in
       static/index.html): bg ~#0a0c11, accent #5b8cff, terminal-green #39d98a. -->
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0c11"/>
  <rect x="1.3" y="1.3" width="29.4" height="29.4" rx="6" fill="none" stroke="#5b8cff" stroke-width="1.1" opacity="0.5" filter="url(#glow)"/>
  <!-- neon play (video) -->
  <path d="M11 8.5 L11 21 L21 14.7 Z" fill="none" stroke="#39d98a" stroke-width="2.3" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- terminal cursor underscore -->
  <rect x="9.5" y="24.2" width="9" height="2.4" rx="1.2" fill="#5b8cff" filter="url(#glow)"/>
</svg>
