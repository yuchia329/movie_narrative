# Reverse proxy in front of the FastAPI app. Terminate TLS here in production
# (add a 443 server + certs, or run behind an ALB / Caddy). SSE needs buffering off.
server {
    listen 80;
    server_name _;
    client_max_body_size 0;   # uploads go straight to S3 (presigned); API bodies are tiny

    # Re-resolve the upstream via Docker's embedded DNS (127.0.0.11) instead of caching its IP
    # at startup. A variable in proxy_pass forces per-request resolution, so a recreated `api`
    # container (new IP after `docker compose up --build`) doesn't leave nginx 502-ing until
    # it's manually restarted. valid=10s bounds how long a stale IP can linger.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    location / {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server-sent events: no buffering, long read timeout.
    location ~ ^/api/runs/.*/events$ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Prometheus scrapes the app metrics here.
    location /metrics {
        proxy_pass http://$api_upstream;
    }
}
