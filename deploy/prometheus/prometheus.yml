# Full Prometheus config for the OPTIONAL observability overlay. If you already run
# Prometheus, ignore this and merge the jobs from scrape.yml instead.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: jieshuo-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: jieshuo-pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
  - job_name: jieshuo-node
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: jieshuo-gpu-services
    metrics_path: /metrics
    static_configs:
      - targets: ["10.10.0.2:9101", "10.10.0.2:9102"]   # gRPC services' side metrics ports
  - job_name: jieshuo-gpu-dcgm
    static_configs:
      - targets: ["10.10.0.2:9400"]
