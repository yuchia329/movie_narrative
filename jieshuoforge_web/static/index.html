<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie Recap 電影解說</title>
  <meta name="description" content="Movie Recap 電影解說 — turn a film into a short narrated recap." />
  <meta property="og:title" content="Movie Recap 電影解說" />
  <meta property="og:description" content="Turn a film into a short narrated recap." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Movie Recap 電影解說" />
  <style>
    :root {
      --bg: #0f1117;
      --panel: #181b24;
      --line: #272b36;
      --fg: #e7e9ee;
      --mut: #9aa3b2;
      --acc: #5b8cff;
      --ok: #39d98a;
      --warn: #f0b84a;
      --err: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font: 15px/1.5 -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 650;
    }

    header .sub {
      color: var(--mut);
      font-size: 13px;
    }

    #budget {
      margin-left: auto;
      font-size: 13px;
      color: var(--mut);
    }

    #budget b {
      color: var(--fg);
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .card h2 {
      font-size: 14px;
      margin: 0 0 12px;
      color: var(--mut);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    button {
      background: var(--acc);
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    button.ghost {
      background: #1f2330;
      color: var(--fg);
      border: 1px solid var(--line);
      padding: 6px 11px;
      font-size: 13px;
    }

    button.ghost:hover {
      border-color: var(--acc);
    }

    select,
    input[type=file] {
      background: #11131a;
      color: var(--fg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .movie,
    .run {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 10px;
    }

    .run {
      background: #13161e;
    }

    .movie .name {
      font-weight: 600;
    }

    .badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #222633;
      color: var(--mut);
      text-transform: lowercase;
    }

    .badge.ready,
    .badge.done {
      color: var(--ok);
    }

    .badge.processing,
    .badge.running,
    .badge.queued,
    .badge.uploaded {
      color: var(--warn);
    }

    .badge.error {
      color: var(--err);
    }

    /* stage tracker */
    .track {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }

    .progress-line {
      font-size: 12px;
      color: var(--mut);
      margin-top: 8px;
    }

    .progress-line b {
      color: var(--fg);
      font-weight: 600;
    }

    .stage {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #11131a;
      color: var(--mut);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .stage.ran {
      color: var(--ok);
      border-color: #234a36;
    }

    .stage.cached {
      color: #6c9bf0;
      border-color: #243a55;
    }

    .stage.running {
      color: #fff;
      background: var(--acc);
      border-color: var(--acc);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .stage.error {
      color: #fff;
      background: var(--err);
      border-color: var(--err);
    }

    .stage.pending {
      opacity: .45;
    }

    /* compute type: a colored LEFT edge per stage (status still drives fill/text color,
       so the two signals never collide). Placed after the status rules so the left-edge
       color wins over their border-color. */
    .stage {
      border-left-width: 3px;
    }

    .stage.k-llm {
      border-left-color: #b07cff;
    }

    .stage.k-gpu {
      border-left-color: #f0a84a;
    }

    .stage.k-cpu {
      border-left-color: #39507a;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--mut);
      margin: 0 0 6px;
    }

    .legend .k {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend i {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      display: inline-block;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(91, 140, 255, .5);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(91, 140, 255, 0);
      }
    }

    /* media player */
    .player-host {
      margin-top: 12px;
    }

    .player {
      width: 100%;
      max-height: 60vh;
      border-radius: 8px;
      background: #000;
      display: block;
    }

    .phint {
      margin-top: 6px;
    }

    .muted {
      color: var(--mut);
      font-size: 13px;
    }

    a {
      color: var(--acc);
    }

    progress {
      width: 160px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Movie Recap<span class="sub">電影解說</span></h1>
  </header>
  <main>
    <div class="card">
      <h2>1 · Upload a movie</h2>
      <div class="row">
        <input type="file" id="file" accept="video/*" />
        <select id="up-lang" title="Output language">
          <option value="zh">中文 解说</option>
          <option value="en">English recap</option>
        </select>
        <button id="upload">Upload &amp; generate</button>
        <span class="muted" id="up-status"></span>
        <progress id="up-prog" value="0" max="100" hidden></progress>
      </div>
      <p class="muted">Pick the output language, then upload — processing and your recap start
        automatically (no second step).</p>
    </div>

    <div class="card">
      <h2>2 · Your movies & recaps</h2>
      <div class="legend">
        <span class="k"><i style="background:#b07cff"></i>🧠 LLM · MiniMax</span>
        <span class="k"><i style="background:#f0a84a"></i>⚡ GPU · ASR/TTS</span>
        <span class="k"><i style="background:#39507a"></i>⚙️ local · CPU</span>
      </div>
      <div id="movies"><span id="movies-empty" class="muted">No movies yet.</span></div>
    </div>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    const api = (p, opt) => fetch(p, { credentials: "same-origin", ...opt }).then(r => {
      if (!r.ok) return r.json().then(j => Promise.reject(j.detail || r.statusText)).catch(() => Promise.reject(r.statusText));
      return r.json();
    });

    // ---- stage display ---------------------------------------------------------
    // Human labels for each canonical pipeline stage (the names themselves come from
    // the API, which reads them from the pipeline; this map is presentation only).
    const STAGE_LABELS = {
      ingest: "probe", audio: "extract audio", asr: "transcribe (ASR)", shots: "detect shots", scenes: "scenes + keyframes",
      understand: "watch & outline", script: "write narration", budget: "fit runtime",
      tts: "synthesize voice", edl: "build timeline", subs: "subtitles", render: "render video",
    };

    // Compute-type icon per stage kind (kinds come from the API's stage_kinds map).
    const STAGE_ICON = { llm: "🧠", gpu: "⚡", cpu: "⚙️" };

    function fmtDur(s) {
      s = +s || 0;
      if (s < 1) return "<1s";
      if (s < 60) return Math.round(s) + "s";
      const m = Math.floor(s / 60), ss = Math.round(s % 60);
      return m + "m" + (ss ? (" " + ss + "s") : "");
    }

    // Stopwatch format for the live elapsed of the running stage (always whole seconds).
    function fmtElapsed(s) {
      s = Math.max(0, Math.floor(+s || 0));
      if (s < 60) return s + "s";
      return Math.floor(s / 60) + "m " + (s % 60) + "s";
    }

    // Compact token count: 1.24M / 830k / 512.
    function fmtTokens(n) {
      n = +n || 0;
      if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
      if (n >= 1e3) return Math.round(n / 1e3) + "k";
      return "" + n;
    }

    function stageStates(all, rows) {
      const by = {}; (rows || []).forEach(s => by[s.stage] = s);
      return (all || []).map((name, i) => {
        const row = by[name];
        return { name, i, label: STAGE_LABELS[name] || name, row, status: row ? row.status : "pending" };
      });
    }

    function trackHtml(all, rows, nowEpoch, kinds) {
      kinds = kinds || {};
      const recv = Date.now() / 1000;
      return stageStates(all, rows).map(st => {
        const kind = kinds[st.name] || "cpu";
        const icon = STAGE_ICON[kind] || "";
        const cls = `stage k-${kind} ${st.status}`;
        const tip = `${st.i + 1}. ${st.label} · ${kind.toUpperCase()}`;
        if (st.status === "running") {
          // Live elapsed: anchor on the server-computed base (now - start), then the 1s
          // ticker adds real wall-time since this render. data-* let it update in place.
          const at = st.row && st.row.at;
          const base = (nowEpoch && at) ? Math.max(0, nowEpoch - at) : 0;
          return `<span class="${cls}" data-name="${st.name}" data-icon="${icon}" data-base="${base}" data-recv="${recv}" title="${tip}">${icon} ${st.name} ${fmtElapsed(base)}</span>`;
        }
        const done = st.status === "ran" || st.status === "cached" || st.status === "error";
        const dur = (done && st.row && st.row.seconds) ? " · " + fmtDur(st.row.seconds) : "";
        const mark = st.status === "cached" ? " ⟲" : "";
        return `<span class="${cls}" title="${tip}">${icon} ${st.name}${mark}${dur}</span>`;
      }).join("");
    }

    // Tick every running stage pill so its elapsed timer advances between server pushes.
    // textContent is rebuilt with the icon (stored in data-icon) so it survives the tick.
    function tickRunning() {
      const nowC = Date.now() / 1000;
      document.querySelectorAll(".stage.running[data-base]").forEach(p => {
        const elapsed = (+p.dataset.base || 0) + (nowC - (+p.dataset.recv || nowC));
        p.textContent = `${p.dataset.icon || ""} ${p.dataset.name} ${fmtElapsed(elapsed)}`;
      });
    }

    function progressLine(all, rows, status) {
      const st = stageStates(all, rows);
      const total = st.length;
      const doneN = st.filter(s => s.status === "ran" || s.status === "cached").length;
      const running = st.find(s => s.status === "running");
      const totalSecs = st.reduce((a, s) => a + ((s.row && s.row.seconds) || 0), 0);
      const sumTxt = totalSecs ? ` · ${fmtDur(totalSecs)} total` : "";
      if (status === "done" || status === "ready") return `<b>${total}/${total} steps</b>${sumTxt}`;
      if (status === "error") return `<b>failed</b> at step ${doneN + 1}/${total}${sumTxt}`;
      if (running) return `<b>step ${running.i + 1}/${total}</b> · ${running.label}…${sumTxt}`;
      if (["running", "processing", "uploaded"].includes(status)) return doneN ? `<b>step ${doneN}/${total}</b> done…${sumTxt}` : `preparing — staging files…`;
      return "queued";
    }

    // ---- media players (lazy, persistent across re-renders) --------------------
    const openPlayers = new Set();   // "movie:<id>" / "run:<id>"

    function playerLabel(kind, open) {
      if (kind === "movie") return open ? "▾ hide" : "▶ play original";
      return open ? "▾ hide recap" : "▶ play recap";
    }

    async function togglePlayer(kind, id) {
      const key = kind + ":" + id;
      const host = document.getElementById((kind === "movie" ? "mplayer-" : "rplayer-") + id);
      if (!host) return;
      const willOpen = !openPlayers.has(key);
      if (willOpen) openPlayers.add(key); else openPlayers.delete(key);
      host.style.display = willOpen ? "" : "none";
      if (willOpen && !host.dataset.loaded) {
        host.innerHTML = `<div class="muted">loading player…</div>`;
        try {
          const ep = kind === "movie" ? `/api/movies/${id}/source-url` : `/api/runs/${id}/result`;
          const j = await api(ep);
          const what = kind === "movie" ? "original upload" : "generated recap";
          host.innerHTML = `<video class="player" controls preload="metadata" playsinline src="${j.url}"></video>
        <div class="phint muted">${what} · <a href="${j.url}" target="_blank" rel="noopener">open in new tab ↗</a>
        <span> — if it doesn't play, the source codec may be unsupported in-browser; use the link.</span></div>`;
          host.dataset.loaded = "1";
        } catch (e) {
          host.innerHTML = `<div class="muted" style="color:var(--err)">could not load: ${e}</div>`;
        }
      }
      const btn = document.querySelector(`#${kind === "movie" ? "movie" : "run"}-${id} .playbtn`);
      if (btn) btn.textContent = playerLabel(kind, willOpen);
    }

    // ---- upload ----------------------------------------------------------------
    async function uploadFlow() {
      const f = $("#file").files[0];
      if (!f) { $("#up-status").textContent = "pick a file first"; return; }
      const lang = ($("#up-lang") && $("#up-lang").value) || "zh";
      $("#upload").disabled = true; $("#up-status").textContent = "requesting URL…";
      try {
        const reg = await api("/api/movies", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: f.name, content_type: f.type || "video/mp4", lang })
        });
        $("#up-status").textContent = "uploading…"; const prog = $("#up-prog"); prog.hidden = false;
        await new Promise((res, rej) => {
          const xhr = new XMLHttpRequest();
          xhr.open(reg.method, reg.upload_url);
          // Don't set Content-Type: the presigned URL no longer signs it, and forcing a header that
          // mismatches an empty mobile file.type is exactly what broke mobile uploads. Let the browser
          // send whatever it wants (S3 ignores the unsigned header).
          xhr.timeout = 30 * 60 * 1000;     // 30 min: large videos over slow cellular
          xhr.upload.onprogress = (e) => { if (e.lengthComputable) prog.value = 100 * e.loaded / e.total; };
          xhr.onload = () => (xhr.status < 300 ? res() : rej("upload failed (" + xhr.status + ")"));
          xhr.onerror = () => rej("network error during upload");
          xhr.ontimeout = () => rej("upload timed out — check your connection and retry");
          xhr.send(f);
        });
        $("#up-status").textContent = "starting processing…";
        await api(`/api/movies/${reg.movie_id}/complete`, { method: "POST" });
        $("#up-status").textContent = "done — processing & generating recap"; prog.hidden = true; $("#file").value = "";
        loadMovies();
      } catch (e) { $("#up-status").textContent = "error: " + e; }
      finally { $("#upload").disabled = false; }
    }

    // ---- runs ------------------------------------------------------------------
    const streaming = new Set();  // run ids with an open SSE

    async function makeRun(movieId, lang, force = false) {
      // force=true regenerates a fresh recap even if this language is already done.
      if (force && !confirm(`Regenerate the ${lang} recap from scratch? This replaces the current one.`)) return;
      try {
        await api("/api/runs", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ movie_id: movieId, lang, force })
        });
        renderMovieRuns(movieId);
      } catch (e) { alert("could not start: " + e); }
    }

    function streamRun(runId) {
      if (streaming.has(runId)) return;
      streaming.add(runId);
      const ev = new EventSource(`/api/runs/${runId}/events`);
      ev.onmessage = (m) => {
        const r = JSON.parse(m.data);
        renderRunInfo(r);
        if (r.status === "done" || r.status === "error") { ev.close(); streaming.delete(runId); }
      };
      ev.onerror = () => { ev.close(); streaming.delete(runId); };
    }

    // Renders only the info region of a run row; the player host is a sibling node that
    // survives these updates (so an open recap player isn't destroyed every SSE tick).
    function renderRunInfo(r) {
      const el = document.getElementById(`run-${r.id}`);
      if (!el) return;
      const info = el.querySelector(".rinfo");
      const playOpen = openPlayers.has("run:" + r.id);
      const playBtn = (r.status === "done" && r.has_output)
        ? `<button class="ghost playbtn" onclick="togglePlayer('run','${r.id}')">${playerLabel('run', playOpen)}</button>`
        : "";
      // Once a run is finished (done or error), offer a one-click regenerate of THIS language
      // (a different language is started from the upload card's picker).
      const regenBtn = (r.status === "done" || r.status === "error")
        ? `<button class="ghost" onclick="makeRun('${r.movie_id}','${r.lang}',true)" title="Generate a fresh ${r.lang} recap">↻ Regenerate</button>`
        : "";
      const parts = [];
      if (r.llm_tokens_in || r.llm_tokens_out) parts.push(`${fmtTokens(r.llm_tokens_in)} in / ${fmtTokens(r.llm_tokens_out)} out`);
      if (r.output_duration_sec) parts.push(`${fmtDur(r.output_duration_sec)} recap`);
      info.innerHTML = `<div class="row">
      <b>${r.lang}</b> <span class="badge ${r.status}">${r.status}</span>
      <span class="muted">${parts.join(" · ")}</span>
      <span style="margin-left:auto"></span>${playBtn}${regenBtn}
    </div>
    ${r.error ? `<div class="muted" style="color:var(--err)">${r.error}</div>` : ""}
    <div class="progress-line">${progressLine(r.all_stages, r.stages, r.status)}</div>
    <div class="track">${trackHtml(r.all_stages, r.stages, r.now, r.stage_kinds)}</div>`;
    }

    async function renderMovieRuns(movieId) {
      let runs = [];
      try { runs = (await api(`/api/movies/${movieId}/runs`)).runs; } catch (e) { return; }
      const host = document.getElementById(`runs-${movieId}`);
      if (!host) return;
      for (const r of runs) {
        let el = document.getElementById(`run-${r.id}`);
        if (!el) {
          el = document.createElement("div"); el.className = "run"; el.id = `run-${r.id}`;
          el.innerHTML = `<div class="rinfo"></div><div class="player-host" id="rplayer-${r.id}" style="display:none"></div>`;
          host.appendChild(el);
        }
        renderRunInfo(r);
        if (r.status === "queued" || r.status === "running") streamRun(r.id);
      }
    }

    // ---- movies ----------------------------------------------------------------
    function movieControls(m) {
      if (m.status === "ready")
        return `<select id="lang-${m.id}"><option value="zh">中文 解说</option><option value="en">English recap</option></select>
      <button onclick="makeRun('${m.id}', document.getElementById('lang-${m.id}').value)">Generate recap</button>`;
      if (m.status === "error") return `<span class="muted" style="color:var(--err)">${m.error || "error"}</span>`;
      return "";
    }

    function upsertMovieCard(m, parent) {
      let card = document.getElementById(`movie-${m.id}`);
      if (!card) {
        card = document.createElement("div"); card.className = "movie"; card.id = `movie-${m.id}`;
        card.innerHTML = `<div class="row">
        <span class="name"></span><span class="badge mbadge"></span><span class="muted mdur"></span>
        <span style="margin-left:auto"></span><span class="mtools"></span><span class="mctl"></span>
      </div>
      <div class="progress-line msteps-line"></div>
      <div class="track msteps"></div>
      <div class="player-host" id="mplayer-${m.id}" style="display:none"></div>
      <div class="runs" id="runs-${m.id}"></div>`;
      }
      parent.appendChild(card);   // (re)appending an existing node reorders without nuking children
      card.querySelector(".name").textContent = m.filename;
      const badge = card.querySelector(".mbadge"); badge.textContent = m.status; badge.className = `badge mbadge ${m.status}`;
      card.querySelector(".mdur").textContent = m.duration_sec ? `${(m.duration_sec / 60).toFixed(0)} min` : "";
      card.querySelector(".mctl").innerHTML = movieControls(m);

      const playOpen = openPlayers.has("movie:" + m.id);
      card.querySelector(".mtools").innerHTML = m.has_source
        ? `<button class="ghost playbtn" onclick="togglePlayer('movie','${m.id}')">${playerLabel('movie', playOpen)}</button>` : "";

      // front-half stage tracker: show while processing, and keep the timing visible once ready
      const showSteps = m.status !== "registered" && (m.stages.length || m.status !== "ready");
      card.querySelector(".msteps-line").innerHTML = showSteps ? progressLine(m.all_stages, m.stages, m.status) : "";
      card.querySelector(".msteps").innerHTML = showSteps ? trackHtml(m.all_stages, m.stages, m.now, m.stage_kinds) : "";

      renderMovieRuns(m.id);
    }

    async function loadMovies() {
      let movies = [];
      try { movies = (await api("/api/movies")).movies; } catch (e) { return; }
      const box = $("#movies");
      if (!movies.length) { box.innerHTML = `<span id="movies-empty" class="muted">No movies yet.</span>`; return; }
      const ph = box.querySelector("#movies-empty"); if (ph) ph.remove();  // drop ONLY the placeholder, never live cards (which contain .muted bits) — wiping them killed an open player every poll
      let processing = false;
      for (const m of movies) {
        upsertMovieCard(m, box);
        if (m.status !== "ready" && m.status !== "error") processing = true;
      }
      if (processing) setTimeout(loadMovies, 5000);   // poll while any front half is in flight
    }

    window.addEventListener("DOMContentLoaded", () => {
      $("#upload").addEventListener("click", uploadFlow);
      window.makeRun = makeRun;
      window.togglePlayer = togglePlayer;
      loadMovies();
      setInterval(tickRunning, 1000);   // advance the running stage's elapsed timer
    });
  </script>
</body>

</html>
